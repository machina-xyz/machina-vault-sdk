name: CI
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
    paths: ["**/*.ts", "**/*.tsx", "**/*.js", "package.json", "pnpm-lock.yaml", ".github/workflows/**"]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
      - name: Install
        run: |
          if [ -f pnpm-lock.yaml ]; then npm i -g pnpm && pnpm install --no-frozen-lockfile
          elif [ -f package-lock.json ]; then npm ci
          elif [ -f yarn.lock ]; then yarn install --frozen-lockfile
          elif [ -f package.json ]; then npm install
          else echo "No package.json"; exit 0; fi
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present || npx tsc --noEmit 2>/dev/null || true
      - run: npm test --if-present
      - run: npm run build --if-present
