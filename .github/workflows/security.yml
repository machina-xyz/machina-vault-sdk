name: Security
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 1 * *"
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true
jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with: { node-version: "20" }
      - name: Install and audit
        run: |
          if [ -f pnpm-lock.yaml ]; then npm i -g pnpm && pnpm install --no-frozen-lockfile && pnpm audit --audit-level high || true
          elif [ -f package-lock.json ]; then npm ci && npm audit --audit-level=high || true
          elif [ -f package.json ]; then npm install && npm audit --audit-level=high || true
          else echo "No package.json"; fi
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@f586c14365d4643c6aa59d472ae6e984bf47bb34 # v2.3.8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Trivy
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          scan-type: fs
          scan-ref: "."
          severity: CRITICAL,HIGH
        continue-on-error: true
